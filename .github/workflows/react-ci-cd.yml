name: React Foundation CI/CD

on:
  push:
    branches:
      - main
    # ✨ 核心隔离：只有当 react-foundation 里的文件变化时，才触发整条流水线
    paths:
      - 'react-foundation/**'
  pull_request:
    branches:
      - main
    paths:
      - 'react-foundation/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 第一阶段：CI (持续集成) - 负责检查和打包
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'react-foundation/package-lock.json'

      - name: Install dependencies
        working-directory: ./react-foundation
        run: npm ci

      - name: Lint check
        working-directory: ./react-foundation
        run: npm run lint

      # 如果你有测试，可以取消下面这两行的注释
      # - name: Run tests
      #   working-directory: ./react-foundation
      #   run: npm test -- --run

      - name: Build project
        working-directory: ./react-foundation
        run: npm run build

      # 将打包好的 dist 文件夹上传，专供 GitHub Pages 部署使用
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./react-foundation/dist

  # ==========================================
  # 第二阶段：CD (持续部署) - 只有推送到 main 才部署
  # ==========================================
  deploy-to-pages:
    # 保证 PR 不会触发部署，只有合并到 main 才会部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test # 必须等上面的 build 成功才能跑
    runs-on: ubuntu-latest
    
    # 环境配置：对应 GitHub 仓库里的 Environment 设置
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # 部署到 GitHub Pages 所需的权限
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
